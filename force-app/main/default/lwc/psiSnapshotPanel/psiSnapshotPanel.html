<template>
  <div class="panel">
    <div class="panelHeader">
      <div class="panelTitle">{snapshot.user.name}</div>
      <div class="panelMeta mono">{snapshot.user.username}</div>
      <div class="panelLine">
        <span class={activePill}>{activeLabel}</span>
        <span class="dot">•</span>
        <span class="muted">{snapshot.user.profileName}</span>
      </div>
    </div>

    <template if:true={snapshot.warning}>
      <div class="note noteWarn">{snapshot.warning}</div>
    </template>

    <div class="grid2">
      <div class="box">
        <div class="boxHead">
          <div class="boxTitle">Permission Sets</div>
          <span class="pill">{snapshot.permissionSets.length}</span>
        </div>
        <ul class="list">
          <template for:each={snapshot.permissionSets} for:item="r">
            <li key={r.id} class="listItem">
              <div class="liMain">{r.name}</div>
              <div class="liSub mono">{r.developerName}</div>
            </li>
          </template>
        </ul>
        <template if:false={snapshot.permissionSets.length}><div class="empty">—</div></template>
      </div>

      <div class="box">
        <div class="boxHead">
          <div class="boxTitle">Groups</div>
          <span class="pill">{snapshot.groups.length}</span>
        </div>
        <ul class="list">
          <template for:each={snapshot.groups} for:item="r">
            <li key={r.id} class="listItem">
              <div class="liMain">{r.name}</div>
              <div class="liSub mono">{r.developerName}</div>
            </li>
          </template>
        </ul>
        <template if:false={snapshot.groups.length}><div class="empty">—</div></template>
      </div>
    </div>

    <template if:true={snapshot.groupExpansionAvailable}>
      <div class="box slds-m-top_medium">
        <div class="boxHead">
          <div class="boxTitle">Permission Sets included via groups</div>
          <span class="pill pillMuted">{snapshot.groupIncludedPermissionSets.length}</span>
        </div>
        <ul class="list">
          <template for:each={snapshot.groupIncludedPermissionSets} for:item="r">
            <li key={r.id} class="listItem">
              <div class="liMain">{r.name}</div>
              <div class="liSub mono">{r.developerName}</div>
            </li>
          </template>
        </ul>
        <template if:false={snapshot.groupIncludedPermissionSets.length}><div class="empty">—</div></template>
      </div>
    </template>
  </div>
</template>
